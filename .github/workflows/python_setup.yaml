name: Python Setup Workflow

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pytest flake8

      - name: Verify Python version
        run: python --version

      - name: Verify Flake8 version
        run: flake8 --version

      - name: Verify Pytest version
        run: pytest --version

